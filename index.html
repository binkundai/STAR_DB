// 替换 index.html 中的整个 <script> 部分
const API_URL = "https://star.dabinkun-8b8.workers.dev"; 

new Vue({
    el: '#app',
    data: {
        isAdmin: false,
        status: '正在连接云端...',
        reasons: { kid1: '', kid2: '' },
        kids: { kid1: { total: 0, logs: [] }, kid2: { total: 0, logs: [] } }
    },
    async created() {
        // 增加延时请求，防止 GitHub 加载过快导致的网络竞争
        setTimeout(() => { this.load(); }, 500);
    },
    methods: {
        async load() {
            try {
                // 明确指定请求头和模式
                const res = await fetch(API_URL, { 
                    method: 'GET',
                    mode: 'cors',
                    headers: { 'Content-Type': 'application/json' }
                });
                if (!res.ok) throw new Error(`HTTP状态码: ${res.status}`);
                this.kids = await res.json();
                this.status = '☁️ 云端同步成功';
            } catch (e) {
                console.error("同步详情:", e);
                this.status = '❌ 同步失败: ' + e.message;
            }
        },
        // ... 其余 save 和 change 函数保持不变 ...
    }
});
