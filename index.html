<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌟 宝贝成长荣誉榜</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { font-family: 'PingFang SC', system-ui; background: #f4f7f6; padding: 15px; margin: 0; color: #2c3e50; -webkit-user-select: none; }
        .container { max-width: 500px; margin: auto; }
        .page-title { text-align: center; color: #2d3748; margin: 15px 0 5px; font-size: 22px; letter-spacing: 2px; }

        /* 状态栏移至标题下方 */
        .status-pill { display: flex; justify-content: center; margin-bottom: 20px; }
        .status-text { background: rgba(0,0,0,0.05); padding: 4px 12px; border-radius: 20px; font-size: 11px; color: #7f8c8d; font-weight: bold; }
        .status-online { color: var(--green); }
        .status-error { color: var(--red); }

        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.04); border: 1px solid #eee; }
        .name { font-size: 20px; font-weight: bold; color: #1a202c; border-left: 4px solid var(--blue); padding-left: 10px; }
        .total-stars { font-size: 48px; color: var(--gold); font-weight: 900; margin: 10px 0; text-align: center; }

        /* 历史记录框 - 支持滑动查看更多 */
        .history-box { background: #fffcf5; border-radius: 14px; padding: 12px; margin-top: 15px; font-size: 13px; max-height: 200px; overflow-y: scroll; border: 1px solid #f3eada; -webkit-overflow-scrolling: touch; }
        .log-item { display: flex; justify-content: space-between; padding: 7px 0; border-bottom: 1px solid #f1f1f1; align-items: center; }
        .log-date { color: #a0aec0; font-size: 10px; width: 80px; }
        .log-reason { flex: 1; margin: 0 8px; color: #4a5568; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .admin-section { margin-top: 15px; padding-top: 15px; border-top: 1px dashed #ddd; }
        .score-label { font-size: 11px; font-weight: bold; margin: 10px 0 8px; color: #94a3b8; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        button { border: none; border-radius: 12px; padding: 12px 0; font-weight: bold; cursor: pointer; color: white; font-size: 15px; box-shadow: 0 3px 0 rgba(0,0,0,0.1); }
        button:active { transform: translateY(2px); box-shadow: none; }
        .btn-add { background: var(--green); }
        .btn-sub { background: var(--red); }
    </style>
</head>
<body>
<div id="app" class="container">
    <h2 class="page-title" @click="handleHeaderClick">🌟 宝贝成长荣誉榜</h2>

    <div class="status-pill">
        <span class="status-text" :class="statusClass">● {{ status }}</span>
    </div>

    <div v-for="(kid, id) in kids" :key="id" class="card">
        <div class="name">{{ id === 'kid1' ? '嘟嘟 Albert' : '啵啵 Clement' }}</div>
        <div class="total-stars">✨ {{ kid.total }}</div>

        <div class="history-box">
            <div v-if="kid.logs.length === 0" style="color:#ccc; text-align:center; padding:10px;">暂无历史</div>
            <div v-for="(log, idx) in kid.logs.slice().reverse()" :key="idx" class="log-item">
                <span class="log-date">{{ log.date }}</span>
                <span class="log-reason">{{ log.reason }}</span>
                <span :style="{color: log.change > 0 ? 'var(--green)' : 'var(--red)', fontWeight: 'bold'}">
                    {{ log.change > 0 ? '+' : '' }}{{ log.change }}
                </span>
            </div>
        </div>

        <div class="admin-section">
            <div class="score-label">奖励分值</div>
            <div class="btn-grid">
                <button v-for="v in [0.5, 1, 2, 5, 10, 15]" class="btn-add" @click="startProcess(id, v)">+{{v}}</button>
            </div>
            <div class="score-label">改进提醒</div>
            <div class="btn-grid">
                <button v-for="v in [0.5, 1, 2, 5, 10, 15]" class="btn-sub" @click="startProcess(id, -v)">-{{v}}</button>
            </div>
        </div>
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            status: '正在连接...',
            statusClass: '',
            kids: { kid1: { total: 0, logs: [] }, kid2: { total: 0, logs: [] } },
            token: '', gistId: '',
            clickCount: 0
        },
        mounted() {
            this.token = localStorage.getItem('stars_token');
            this.gistId = localStorage.getItem('stars_gistid');
            if (this.token && this.gistId) { this.load(); }
            else { this.status = '待配置 (连击标题)'; }
        },
        methods: {
            handleHeaderClick() {
                this.clickCount++;
                if (this.clickCount === 5) { this.doConfig(); this.clickCount = 0; }
                setTimeout(() => { this.clickCount = 0; }, 2000);
            },
            async load() {
                try {
                    const res = await fetch(`https://api.github.com/gists/${this.gistId}?t=${Date.now()}`, {
                        headers: { 'Authorization': `token ${this.token}` }
                    });
                    const data = await res.json();
                    this.kids = JSON.parse(data.files['stars.json'].content);
                    this.status = '云端已就绪';
                    this.statusClass = 'status-online';
                } catch (e) {
                    this.status = '同步失败';
                    this.statusClass = 'status-error';
                }
            },
            async save() {
                this.status = '正在同步...';
                try {
                    // 数据修剪至 30 条
                    this.kids.kid1.logs = this.kids.kid1.logs.slice(-30);
                    this.kids.kid2.logs = this.kids.kid2.logs.slice(-30);
                    const res = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `token ${this.token}` },
                        body: JSON.stringify({ files: { 'stars.json': { content: JSON.stringify(this.kids) } } })
                    });
                    if (res.ok) { this.status = '更新成功'; this.statusClass = 'status-online'; }
                } catch (e) {
                    this.status = '保存失败';
                    this.statusClass = 'status-error';
                }
            },
           startProcess(kidId, val) {
                const kidName = kidId === 'kid1' ? '嘟嘟 Albert' : '啵啵 Clement';
                const kidName = kidId === 'kid1' ? ' 嘟嘟 ' : ' 啵啵 ';
                const action = val > 0 ? '奖励' : '扣减';

                // 第一步：弹出输入框要求输入原因
                const reason = prompt(`请输入给${kidName}${action}${Math.abs(val)}颗星的原因:`);

                // 如果用户取消或未输入，则终止
                if (reason === null) return; 
                const finalReason = reason.trim() || (val > 0 ? '表现优秀' : '需要改进');

                // 第二步：弹出确认框显示结果
                const confirmMsg = `【操作确认】\n对象：${kidName}\n变动：${val > 0 ? '+' : ''}${val} 颗星\n原因：${finalReason}\n\n确定要提交吗？`;

                if (confirm(confirmMsg)) {
                    this.executeChange(kidId, val, finalReason);
                }
            },
            executeChange(kidId, val, reason) {
                const now = new Date();
                const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

                this.kids[kidId].total = parseFloat((this.kids[kidId].total + val).toFixed(1));
                this.kids[kidId].logs.push({ date: dateStr, reason: reason, change: val });
                this.save();
            },
            doConfig() {
                if (prompt("管理口令:") !== "1234") return;
                const t = prompt("Token:", this.token);
                const g = prompt("Gist ID:", this.gistId);
                if (t && g) {
                    localStorage.setItem('stars_token', t.trim());
                    localStorage.setItem('stars_gistid', g.trim());
                    location.reload();
                }
            }
        }
    });
</script>
</body>
</html>
