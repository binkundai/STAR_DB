<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🌟 宝贝成长荣誉榜</title>
    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.js"></script>
    <style>
        :root { --gold: #f1c40f; --green: #2ecc71; --red: #e74c3c; --blue: #3498db; }
        body { font-family: 'PingFang SC', system-ui; background: #f8f9fa; padding: 15px; margin: 0; color: #2c3e50; }
        .card { background: white; border-radius: 24px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #edf2f7; }
        .kid-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #f1f1f1; padding-bottom: 10px; }
        .name { font-size: 22px; font-weight: bold; color: #1a202c; }
        .total-stars { font-size: 40px; color: var(--gold); font-weight: 900; margin: 15px 0; text-align: center; }
        
        /* 历史记录样式 */
        .history-box { background: #fdfaf3; border-radius: 12px; padding: 12px; margin-top: 15px; font-size: 13px; max-height: 180px; overflow-y: auto; border: 1px solid #f3eada; }
        .history-title { font-weight: bold; color: #718096; margin-bottom: 8px; font-size: 12px; display: flex; justify-content: space-between; }
        .log-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #eee; align-items: center; }
        .log-date { color: #a0aec0; font-size: 11px; width: 85px; }
        .log-reason { flex: 1; margin: 0 8px; color: #4a5568; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .log-change { font-weight: bold; width: 40px; text-align: right; }

        /* 操作面板 */
        .admin-section { margin-top: 20px; padding-top: 15px; border-top: 1px dashed #cbd5e0; }
        .reason-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 12px; box-sizing: border-box; font-size: 14px; background: #f7fafc; }
        .score-label { font-size: 12px; font-weight: bold; margin: 10px 0 5px; color: #718096; }
        .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 15px; }
        button { border: none; border-radius: 10px; padding: 10px 5px; font-weight: bold; cursor: pointer; color: white; transition: transform 0.1s; }
        button:active { transform: scale(0.95); }
        .btn-add { background: var(--green); box-shadow: 0 3px 0 #27ae60; }
        .btn-sub { background: var(--red); box-shadow: 0 3px 0 #c0392b; }
        
        .status-bar { text-align: center; font-size: 11px; color: #a0aec0; margin: 30px 0; line-height: 2; }
        .config-link { color: var(--blue); text-decoration: none; border-bottom: 1px solid var(--blue); }
    </style>
</head>
<body>
<div id="app" style="max-width: 500px; margin: auto;">
    <h2 style="text-align: center; color: #2d3748; margin: 20px 0;">🌟 宝贝成长云榜单</h2>
    
    <div v-for="(kid, id) in kids" :key="id" class="card">
        <div class="kid-header">
            <span class="name">{{ id === 'kid1' ? '嘟嘟 Albert' : '啵啵 Clement' }}</span>
            <span style="font-size: 12px; color: #a0aec0;">实时云同步</span>
        </div>
        
        <div class="total-stars">✨ {{ kid.total }}</div>
        
        <div class="history-box">
            <div class="history-title">
                <span>最近动态</span>
                <span>(保留10条)</span>
            </div>
            <div v-if="kid.logs.length === 0" style="color:#ccc; text-align:center; padding:10px;">暂无记录</div>
            <div v-for="(log, idx) in kid.logs.slice().reverse().slice(0, 10)" :key="idx" class="log-item">
                <span class="log-date">{{ log.date }}</span>
                <span class="log-reason">{{ log.reason }}</span>
                <span class="log-change" :style="{color: log.change > 0 ? 'var(--green)' : 'var(--red)'}">
                    {{ log.change > 0 ? '+' : '' }}{{ log.change }}
                </span>
            </div>
        </div>

        <div class="admin-section">
            <input v-model="reasons[id]" class="reason-input" :placeholder="'给' + (id==='kid1'?'大宝':'小宝') + '写个评语...'">
            
            <div class="score-label">🟢 表现优秀 (奖励)</div>
            <div class="btn-grid">
                <button v-for="v in [0.5, 1, 2, 3, 4, 5]" class="btn-add" @click="change(id, v)">+{{v}}</button>
            </div>
            
            <div class="score-label">🔴 需改进 (扣除)</div>
            <div class="btn-grid">
                <button v-for="v in [0.5, 1, 2, 3, 4, 5]" class="btn-sub" @click="change(id, -v)">-{{v}}</button>
            </div>
        </div>
    </div>

    <div class="status-bar">
        <div>{{ status }}</div>
        <div style="margin-top:5px;">
            <a href="javascript:void(0)" class="config-link" @click="doConfig">⚙️ 重新配置密钥</a>
        </div>
    </div>
</div>

<script>
    new Vue({
        el: '#app',
        data: {
            status: '⏳ 初始化...',
            kids: { kid1: { total: 0, logs: [] }, kid2: { total: 0, logs: [] } },
            reasons: { kid1: '', kid2: '' },
            token: '', gistId: '',
            clickCount: 0 // 用于隐藏入口
        },
        mounted() {
            this.token = localStorage.getItem('stars_token');
            this.gistId = localStorage.getItem('stars_gistid');
            if (this.token && this.gistId) { this.load(); }
            else { this.status = '💡 待配置 (请联系家长)'; }
        },
        methods: {
            // 策略 1：连续点击标题 5 次才会触发配置，防止小孩误触
            handleHeaderClick() {
                this.clickCount++;
                if (this.clickCount === 5) {
                    this.doConfig();
                    this.clickCount = 0;
                }
                setTimeout(() => { this.clickCount = 0; }, 2000); // 2秒内没点够就清零
            },

            async load() {
                this.status = '⏳ 同步中...';
                try {
                    const res = await fetch(`https://api.github.com/gists/${this.gistId}?t=${Date.now()}`, {
                        headers: { 'Authorization': `token ${this.token}` }
                    });
                    if (!res.ok) throw new Error();
                    const data = await res.json();
                    this.kids = JSON.parse(data.files['stars.json'].content);
                    this.status = '✅ 云端已同步';
                } catch (e) {
                    this.status = '❌ 连接失败 (Token可能被乱改了)';
                }
            },

            async save() {
                // 策略 2：保存前进行简单的身份确认 (可选)
                this.status = '⏳ 同步中...';
                try {
                    const res = await fetch(`https://api.github.com/gists/${this.gistId}`, {
                        method: 'PATCH',
                        headers: { 'Authorization': `token ${this.token}` },
                        body: JSON.stringify({
                            files: { 'stars.json': { content: JSON.stringify(this.kids) } }
                        })
                    });
                    this.status = res.ok ? '✅ 保存成功' : '❌ 保存失败';
                } catch (e) {
                    this.status = '❌ 网络异常';
                }
            },

            change(kidId, val) {
                // 策略 3：防止小孩给自己加分，点击按钮时弹出一个简单的口令
                // 如果觉得麻烦可以删掉下面这行
                if (val > 2 && !confirm("确定要奖励这么多星星吗？")) return;

                const now = new Date();
                const dateStr = `${now.getMonth()+1}/${now.getDate()} ${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;
                const reason = this.reasons[kidId].trim() || (val > 0 ? '表现棒棒哒' : '继续努力');
                
                this.kids[kidId].total = parseFloat((this.kids[kidId].total + val).toFixed(1));
                this.kids[kidId].logs.push({ date: dateStr, reason: reason, change: val });
                this.reasons[kidId] = '';
                this.save();
            },

            doConfig() {
                // 增加一层简单的数字密码，防止小孩乱入配置界面
                const pwd = prompt("请输入管理密码进入配置:");
                if (pwd !== "1234") { // 你可以改成别的数字
                    alert("密码错误");
                    return;
                }
                
                const t = prompt("GitHub Token:", this.token);
                const g = prompt("Gist ID:", this.gistId);
                if (t && g) {
                    localStorage.setItem('stars_token', t.trim());
                    localStorage.setItem('stars_gistid', g.trim());
                    location.reload();
                }
            }
        }
    });
</script>
</body>
</html>
